# ============================================
# render.yaml — Render Deployment Config
# https://render.com/docs/blueprint-spec
# ============================================

services:
  - type: web
    name: medivault-ragbot
    runtime: docker

    # Build and start commands are handled by the Dockerfile
    # Dockerfile uses python:3.11-slim-bookworm and runs:
    #   uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}
    
    # Production: Health check configuration
    healthCheckPath: /health
    
    # Production: Instance configuration
    plan: free  # Change to 'starter' or higher for production workloads
    numInstances: 1  # Scale up for high availability
    
    # Region — pick closest to your users
    region: oregon  # or singapore / frankfurt
    
    # Production: Auto-deploy on every push to main
    autoDeploy: true

    # ========================================
    # Environment Variables
    # ========================================
    # CRITICAL: Set these secrets in Render Dashboard:
    #   1. GROQ_API_KEY - Your Groq API key for LLAMA 3.1
    #   2. MONGODB_URI - Your MongoDB Atlas connection string
    # ========================================
    envVars:
      #  LLM 
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: LLM_TEMPERATURE
        value: "0.1"
      - key: LLM_MAX_TOKENS
        value: "1500"

      #  Groq API Key (set secret in Render Dashboard) 
      - key: GROQ_API_KEY
        sync: false              # Render will prompt you to enter this secret

      #  MongoDB Atlas 
      - key: MONGODB_URI
        sync: false              # Enter your Atlas connection string in Dashboard
      - key: MONGODB_DB_NAME
        value: medivault
      - key: MONGODB_COLLECTION_NAME
        value: medical_vectors

      #  Embeddings 
      - key: USE_LOCAL_EMBEDDINGS
        value: "true"
      - key: LOCAL_EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIMENSION
        value: "384"

      #  Chunking 
      - key: CHUNK_SIZE
        value: "600"
      - key: CHUNK_OVERLAP_PERCENT
        value: "0.25"

      #  API 
      - key: API_HOST
        value: "0.0.0.0"

      #  CORS — restrict to your frontend domain 
      # Replace with your actual frontend URL before production
      - key: CORS_ORIGINS
        value: '["*"]'  # TODO: Change to actual frontend URL for production

      #  Vector Search 
      - key: VECTOR_INDEX_NAME
        value: vector_index
      - key: DEFAULT_RETRIEVAL_K
        value: "5"
      - key: MAX_CONTEXT_LENGTH
        value: "3500"
